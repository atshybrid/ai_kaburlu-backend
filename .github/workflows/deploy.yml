name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main          # Auto-deploy on push to main
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit -p tsconfig.build.json

      - name: Build
        run: npm run build

  # ─── Job 2: Deploy to DigitalOcean App Platform ────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build   # Only deploy if build passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl (DigitalOcean CLI)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy app via App Platform
        run: |
          doctl apps create --spec .do/app.yaml --no-wait 2>/dev/null || \
          doctl apps update ${{ secrets.DIGITALOCEAN_APP_ID }} --spec .do/app.yaml --no-wait

      - name: Wait for deployment
        run: |
          echo "Deployment triggered. Waiting for it to go live..."
          for i in $(seq 1 20); do
            STATUS=$(doctl apps get ${{ secrets.DIGITALOCEAN_APP_ID }} --format ActiveDeployment.Phase --no-header 2>/dev/null || echo "UNKNOWN")
            echo "[$i/20] Status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "✅ Deployment successful!"
              exit 0
            fi
            if [ "$STATUS" = "ERROR" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
            sleep 30
          done
          echo "⏱ Deployment still in progress. Check DigitalOcean dashboard."

      - name: Notify success
        if: success()
        run: |
          echo "🚀 KhabarX Backend deployed successfully to DigitalOcean!"
          echo "App ID: ${{ secrets.DIGITALOCEAN_APP_ID }}"
